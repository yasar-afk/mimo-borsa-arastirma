# ============================================================
# config_v21.yaml — Trading Bot Trading Bot v2.1
# Amaç : v2.1 stratejisi için özel konfigürasyon.
#         v2.1 = v2 + SHORT (short işlemi açabilir)
# ============================================================

# ─── Strateji Ayarları ────────────────────────────────────────
strategy:
  version: "v2.1"               # SHORT desteği olan v2.1 politikası
  min_volume_ratio: 0.7

# ─── Teknik İndikatör Ayarları ────────────────────────────────
technical:
  adx_threshold: 18.0

# ─── Borsa Ayarları ──────────────────────────────────────────
exchange:
  name: binance
  symbol: "BTC/USDT"
  sandbox: false
  default_type: "future"        # Futures zorunlu (short için)
  rate_limit: true
  recv_window: 5000
  request_timeout: 30

# ─── Veri Toplama Ayarları ───────────────────────────────────
data:
  timeframes:
    - "15m"
    - "1h"
    - "4h"
  limit: 500
  primary_timeframe: "15m"
  cache_enabled: true
  cache_ttl_seconds: 900

  polling:
    "15m": 900
    "1h": 3600
    "4h": 14400

  validation:
    max_missing_candles: 5
    min_volume_threshold: 0
    price_spike_factor: 0.1

# ─── Risk Yönetimi ────────────────────────────────────────────
risk:
  max_position_pct: 0.02
  max_daily_drawdown_pct: 0.05
  min_risk_reward_ratio: 2.0
  atr_stop_multiplier: 2.0
  normal_risk_pct: 0.10
  high_risk_pct: 0.20

# ─── Loglama ─────────────────────────────────────────────────
logging:
  level: "INFO"
  log_dir: "logs_v21"           # v2.1 için ayrı log dizini
  max_bytes: 10485760
  backup_count: 5
  console_output: true

# ─── Paper Trading ────────────────────────────────────────────
paper_trading:
  enabled: true
  initial_balance_usdt: 10000
  commission_rate: 0.001

# ─── Emir Yürütme ─────────────────────────────────────────────
execution:
  order_type: "limit"
  limit_timeout_minutes: 15
  leverage: 5
  margin_mode: "ISOLATED"
