# ============================================================
# config_v4.yaml — Trading Bot Trading Bot v4
# Amaç : v4 Price Action / SMC stratejisi için özel konfigürasyon.
# ============================================================

# ─── Strateji Ayarları ────────────────────────────────────────
strategy:
  version: "v4"                 # Price Action / SMC V4
  min_volume_ratio: 0.7
  sweep_window: 120             # Optimized sweep window for high probability setups
  max_hold_sweep: 5
  require_trend: true           # EMA 200 trend filter enabled
  displacement_atr_mult: 1.5
  use_premium_discount: true
  use_session_filter: true      # Restrict entries strictly to London & NY mornings
  use_ote_filter: false         # Fibonacci OTE filter (disabled by default for V1 maximum profit, set to true to enable)
  use_volume_filter: false      # Volume breakout filter (disabled by default, set to true to enable)
  use_funding_oi_filter: false   # Funding Rate and Open Interest filters (disabled by default, set to true to enable)

# ─── Teknik İndikatör Ayarları ────────────────────────────────
technical:
  adx_threshold: 18.0

# ─── Borsa Ayarları ──────────────────────────────────────────
exchange:
  name: binance
  symbol: "BTC/USDT"
  sandbox: false
  default_type: "future"        # Futures required for short/leverage
  rate_limit: true
  recv_window: 5000
  request_timeout: 30

# ─── Veri Toplama Ayarları ───────────────────────────────────
data:
  timeframes:
    - "15m"
    - "1h"
    - "4h"
  limit: 500
  primary_timeframe: "15m"
  cache_enabled: true
  cache_ttl_seconds: 900

  polling:
    "15m": 900
    "1h": 3600
    "4h": 14400

  validation:
    max_missing_candles: 5
    min_volume_threshold: 0
    price_spike_factor: 0.1

# ─── Risk Yönetimi ────────────────────────────────────────────
risk:
  max_position_pct: 0.02
  max_daily_drawdown_pct: 0.05
  min_risk_reward_ratio: 3.0
  atr_stop_multiplier: 2.0
  normal_risk_pct: 0.10
  high_risk_pct: 0.20

# ─── Loglama ─────────────────────────────────────────────────
logging:
  level: "INFO"
  log_dir: "logs_v4"           # Log directory for V4
  max_bytes: 10485760
  backup_count: 5
  console_output: true

# ─── Paper Trading ────────────────────────────────────────────
paper_trading:
  enabled: true
  initial_balance_usdt: 10000
  commission_rate: 0.00063      # BNB discounted taker fee rate (conservative exit assumption)

# ─── Emir Yürütme ─────────────────────────────────────────────
execution:
  order_type: "market"
  limit_timeout_minutes: 180
  leverage: 5
  margin_mode: "ISOLATED"

# ─── Yapay Zeka Sinyal Doğrulama ──────────────────────────────
use_ai_signal_verification: false
